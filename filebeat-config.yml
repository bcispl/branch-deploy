filebeat.inputs:
  - type: filestream
    id: docker-logs
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

output.elasticsearch:
  hosts:
    - "http://elasticsearch:9200"

setup.kibana:
  host: "http://kibana:5601"

logging.level: info
